name: Build & Test Ring Buffer

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        target: [debug, ubsan, tsan, valgrind]

    steps:
      # 1. Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Install dependencies (make, gcc, valgrind)
      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential valgrind

      # 3. Run the make target
      - name: Build and run ${{ matrix.target }}
        run: |
          make clean
          make ${{ matrix.target }}
